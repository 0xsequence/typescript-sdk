packages:
  - "."
  - "packages/*"
  - "examples/*"

allowBuilds:
  '@reown/appkit': false
  bufferutil: false
  esbuild: true
  protobufjs: false
  utf-8-validate: false

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - '@0xtrails/api@0.16.0'
  - '@0xtrails/wallet@0.16.0'
  - '0xtrails@0.16.0'
