name: GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Build React example
        run: pnpm build:example
        env:
          GITHUB_PAGES: 'true'
          VITE_OMS_PUBLISHABLE_KEY: ${{ secrets.OMS_PUBLIC_API_KEY }}
          VITE_OMS_PROJECT_ID: ${{ secrets.OMS_PROJECT_ID }}

      - name: Build Trails Actions example
        run: pnpm build:trails-actions-example
        env:
          GITHUB_PAGES: 'true'
          VITE_OMS_PUBLISHABLE_KEY: ${{ secrets.OMS_PUBLIC_API_KEY }}
          VITE_OMS_PROJECT_ID: ${{ secrets.OMS_PROJECT_ID }}

      - name: Stage Pages artifact
        run: |
          mkdir -p pages/react-example
          mkdir -p pages/trails-actions-example
          cp -R examples/react/dist/. pages/react-example/
          cp -R examples/trails-actions/dist/. pages/trails-actions-example/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}trails-actions-example/

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
