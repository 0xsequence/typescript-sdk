name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Typecheck, tests, and builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package versions
        run: pnpm check:package-versions

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Run tests
        env:
          OMS_PROJECT_ACCESS_KEY: ${{ secrets.OMS_PROJECT_ACCESS_KEY }}
        run: pnpm test

      - name: Build SDK
        run: pnpm build

      - name: Build OMS Wallet wagmi connector
        run: pnpm --filter @0xsequence/oms-wallet-wagmi-connector build

      - name: Test OMS Wallet wagmi connector
        run: pnpm --filter @0xsequence/oms-wallet-wagmi-connector test

      - name: Build React example
        run: pnpm build:example
        env:
          VITE_OMS_PUBLISHABLE_KEY: ci-publishable-key
          VITE_OMS_PROJECT_ID: ci-project-id

      - name: Build Trails Actions example
        run: pnpm build:trails-actions-example
        env:
          VITE_OMS_PUBLISHABLE_KEY: ci-publishable-key
          VITE_OMS_PROJECT_ID: ci-project-id

      - name: Build Wagmi example
        run: pnpm --filter wagmi-example build
        env:
          VITE_OMS_PUBLISHABLE_KEY: ci-publishable-key
          VITE_OMS_PROJECT_ID: ci-project-id
          VITE_TRAILS_API_KEY: ci-trails-key
